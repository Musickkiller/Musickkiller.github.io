<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME NAHUI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d0e12;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
            position: relative;
        }
        #visualizer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        #youtube-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #youtube-bg.visible {
            opacity: 1;
        }
        #youtube-bg iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }
        .player-card {
            background: linear-gradient(145deg, rgba(20, 22, 29, 0.92), rgba(27, 30, 38, 0.92));
            border: 2px solid #57f287;
            box-shadow: 0 0 20px rgba(87, 242, 135, 0.3);
            border-radius: 12px;
            padding: 30px;
            width: 380px;
            text-align: center;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(6px);
        }
        .title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #57f287;
        }
        .subtitle { font-size: 0.8rem; color: #8a8f98; margin-bottom: 20px; }

        /* ВКЛАДКИ */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2c2f36;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 15px;
            background: rgba(27, 30, 38, 0.85);
            color: #8a8f98;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .tab-btn:hover {
            background: #2c2f36;
            color: #fff;
        }
        .tab-btn.active {
            background: rgba(87, 242, 135, 0.15);
            color: #57f287;
            border-bottom: 2px solid #57f287;
        }

        .track-list {
            background: rgba(27, 30, 38, 0.85);
            border: 1px solid #2c2f36;
            border-radius: 8px;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
        }
        .track-list::-webkit-scrollbar { width: 4px; }
        .track-list::-webkit-scrollbar-track { background: #1b1e26; }
        .track-list::-webkit-scrollbar-thumb { background: #57f287; border-radius: 2px; }
        .track-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #8a8f98;
            transition: all 0.2s ease;
            border-bottom: 1px solid #2c2f36;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .track-item:last-child { border-bottom: none; }
        .track-item:hover { background: #2c2f36; color: #fff; }
        .track-item.active {
            background: rgba(87, 242, 135, 0.1);
            color: #57f287;
            border-left: 3px solid #57f287;
        }
        .track-item .track-number { font-size: 0.7rem; opacity: 0.5; min-width: 20px; }
        .track-item .track-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .controls { margin-bottom: 20px; }
        .play-btn {
            background-color: #57f287;
            color: #0d0e12;
            border: none;
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(87, 242, 135, 0.4);
            font-family: 'Courier New', Courier, monospace;
        }
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 25px rgba(87, 242, 135, 0.6);
        }
        .progress-container {
            background-color: #2c2f36;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            height: 6px;
            width: 100%;
            position: relative;
        }
        .progress {
            background-color: #57f287;
            border-radius: 5px;
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #8a8f98;
            margin-bottom: 20px;
        }
        .volume-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .volume-icon { font-size: 1rem; color: #57f287; min-width: 20px; }
        .volume-slider-container {
            flex: 1;
            position: relative;
            height: 6px;
            background-color: #2c2f36;
            border-radius: 5px;
            cursor: pointer;
        }
        .volume-level {
            background-color: #57f287;
            border-radius: 5px;
            height: 100%;
            width: 80%;
            transition: width 0.05s linear;
            pointer-events: none;
        }
        /* Ползунок (ручка) */
        .volume-thumb {
            position: absolute;
            top: 50%;
            left: 80%;
            width: 14px;
            height: 14px;
            background: #57f287;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px rgba(87, 242, 135, 0.5);
            cursor: grab;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            z-index: 2;
        }
        .volume-thumb:hover {
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 14px rgba(87, 242, 135, 0.8);
        }
        .volume-thumb.dragging {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.4);
            box-shadow: 0 0 18px rgba(87, 242, 135, 1);
        }
        .volume-value {
            font-size: 0.7rem;
            color: #8a8f98;
            min-width: 35px;
            text-align: right;
        }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .nav-btn {
            background: #2c2f36;
            color: #57f287;
            border: 1px solid #57f287;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-family: 'Courier New', Courier, monospace;
        }
        .nav-btn:hover {
            background: #57f287;
            color: #0d0e12;
            box-shadow: 0 0 15px rgba(87, 242, 135, 0.4);
        }
    </style>
</head>
<body>

    <canvas id="visualizer"></canvas>
    <div id="youtube-bg"></div>

    <div class="player-card">
        <div class="title">WELCOME NAHUI</div>
        <div class="subtitle" id="trackSubtitle">CHILL</div>

        <!-- ВКЛАДКИ -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="chill">Chill</button>
            <button class="tab-btn" data-tab="nostalgia">Ностальгия</button>
        </div>

        <div class="track-list" id="trackList"></div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" title="Предыдущий">◄</button>
            <button class="nav-btn" id="nextBtn" title="Следующий">►</button>
        </div>

        <audio id="audio" preload="auto"></audio>

        <div class="controls">
            <button class="play-btn" id="playBtn">PLAY</button>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>

        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <div class="volume-section">
            <span class="volume-icon" id="volumeIcon">🔊</span>
            <div class="volume-slider-container" id="volumeContainer">
                <div class="volume-level" id="volumeLevel"></div>
                <div class="volume-thumb" id="volumeThumb"></div>
            </div>
            <span class="volume-value" id="volumeValue">80%</span>
        </div>
    </div>

    <script>
        // ПЛЕЙЛИСТЫ
        const playlists = {
            chill: [
                { name: "Mirage", artist: "Creepy Nuts", src: "https://cdn11.deliciousoranges.com/s1/get/music/20250711/Creepy_Nuts_-_Mirage_79280769.mp3" },
                { name: "Don't tell your dreams", artist: "LOVIXX, STOSLIV", src: "https://cdn5.deliciousoranges.com/s1/get/music/20260621/LOVIXX_-_Dont_tell_your_dreams_81746473.mp3" },
                { name: "Hilfe", artist: "Lostboi Lino", src: "https://s1.deliciouspeaches.com/get/music/20250821/Lostboi_Lino_-_Hilfe_79520224.mp3" },
                { name: "Hurricane", artist: "BUNT. feat. HON, SMBDY", src: "https://s3.deliciouspeaches.com/get/music/20220126/BUNT_feat_HON_SMBDY_-_Hurricane_73712791.mp3" },
                { name: "Make It Bun Dem", artist: "Skrillex", src: "https://cdn2.deliciousoranges.com/s1/get/music/20170905/Skrillex_-_Make_It_Bun_Dem_48256501.mp3", videoId: "1nj2EbEIQZ0" }
            ],
            nostalgia: [
                { name: "Nine Thou", artist: "Styles of Beyond", src: "https://s1dw.pesni.me/L3RyYWNrLzE4NjAzNjY0L1N0eWxlcyBvZiBCZXlvbmQgLSBOaW5lIFRob3UgKHBlc25pLmZtKS5tcDM=.mp3" },
                { name: "Ezio's Family", artist: "Jesper Kyd", src: "https://s2dw.pesni.me/L3RyYWNrLzEyNjQ4NDkwL0plc3BlciBLeWQgLSBFemlvJ3MgRmFtaWx5IChwZXNuaS5mbSkubXAz.mp3" },
                { name: "Make It Bun Dem", artist: "Skrillex", src: "https://cdn2.deliciousoranges.com/s1/get/music/20170905/Skrillex_-_Make_It_Bun_Dem_48256501.mp3"},
                { name: "PVZ OST", artist: "Laura Shigihara", src: "https://s2dw.pesni.me/L3RyYWNrLzExNDg4NzU2L0xhdXJhIFNoaWdpaGFyYSAtIFB2WiBPU1QgVHJhY2sgMDcgKHBlc25pLmZtKS5tcDM=.mp3" },
                { name: "Minecraft", artist: "C418", src: "https://s2dw.pesni.me/L3RyYWNrLzExNjQ1OTkyL0M0MTggLSBNaW5lY3JhZnQgKHBlc25pLmZtKS5tcDM=.mp3" },
                { name: "Stalker shadow of chernobyl", artist: "Main menu", src: "https://s2dw.pesni.me/L3RyYWNrLzExMTEwNTE5L0hlYXRoZXIgQWxleGFuZGVyIC0gU2hhZG93IFN0YWxrZXIgKHBlc25pLmZtKS5tcDM=.mp3" },
                { name: "Metro 2033", artist: "Main menu", src: "https://s2dw.pesni.me/L3RyYWNrLzEwODkyNTcyL01pc2MgLSBNZXRybyAyMDMzIE1lbnUgVGhlbWUgKHBlc25pLmZtKS5tcDM=.mp3" },
                { name: "Aria Math (slowed + reverb)", artist: "Bxkq", src: "https://s1dw.pesni.me/L3RyYWNrLzE4NTgyODA2L0J4a3EgLSBBcmlhIE1hdGggKHBlc25pLmZtKS5tcDM=.mp3" }
            ]
        };

        let currentTab = 'chill';
        let currentTrackIndex = 0;
        let volume = 0.8;

        function getCurrentTracks() {
            return playlists[currentTab];
        }

        // DOM 
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const progress = document.getElementById('progress');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const trackList = document.getElementById('trackList');
        const trackSubtitle = document.getElementById('trackSubtitle');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const volumeContainer = document.getElementById('volumeContainer');
        const volumeLevel = document.getElementById('volumeLevel');
        const volumeThumb = document.getElementById('volumeThumb');
        const volumeValue = document.getElementById('volumeValue');
        const volumeIcon = document.getElementById('volumeIcon');
        const youtubeBg = document.getElementById('youtube-bg');
        const tabBtns = document.querySelectorAll('.tab-btn');

        // ВИЗУАЛИЗАТОР
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }

        // ВОЛНЫ (AURORA)
        const waves = [
            { y: 0.65, amplitude: 60, frequency: 0.008, speed: 0.015, color1: 'rgba(87, 242, 135, 0.18)', color2: 'rgba(87, 242, 135, 0.0)', phase: 0 },
            { y: 0.72, amplitude: 80, frequency: 0.006, speed: 0.010, color1: 'rgba(87, 242, 135, 0.25)', color2: 'rgba(87, 242, 135, 0.0)', phase: 1.5 },
            { y: 0.80, amplitude: 50, frequency: 0.012, speed: 0.020, color1: 'rgba(120, 255, 170, 0.30)', color2: 'rgba(87, 242, 135, 0.0)', phase: 3.0 },
            { y: 0.88, amplitude: 35, frequency: 0.015, speed: 0.025, color1: 'rgba(180, 255, 210, 0.20)', color2: 'rgba(87, 242, 135, 0.0)', phase: 4.5 }
        ];

        // ЧАСТИЦЫ
        let particles = [];
        const PARTICLE_COUNT = 50;

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.8 + 0.4,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3 - 0.15,
                    alpha: Math.random() * 0.5 + 0.2,
                    twinkleSpeed: Math.random() * 0.03 + 0.01,
                    twinklePhase: Math.random() * Math.PI * 2
                });
            }
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function drawWave(wave, time, volumeFactor) {
            const WIDTH = canvas.width;
            const HEIGHT = canvas.height;
            const baseY = HEIGHT * wave.y;
            const amp = wave.amplitude * volumeFactor;

            ctx.beginPath();
            ctx.moveTo(0, HEIGHT);

            for (let x = 0; x <= WIDTH; x += 4) {
                const y = baseY +
                    Math.sin(x * wave.frequency + time * wave.speed + wave.phase) * amp +
                    Math.sin(x * wave.frequency * 2.3 + time * wave.speed * 1.5) * amp * 0.3 +
                    Math.sin(x * wave.frequency * 0.5 + time * wave.speed * 0.7) * amp * 0.5;

                if (x === 0) {
                    ctx.lineTo(0, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.lineTo(WIDTH, HEIGHT);
            ctx.closePath();

            const gradient = ctx.createLinearGradient(0, baseY - amp, 0, HEIGHT);
            gradient.addColorStop(0, wave.color1);
            gradient.addColorStop(1, wave.color2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        function drawParticles(time, volumeFactor) {
            for (const p of particles) {
                p.x += p.speedX;
                p.y += p.speedY;
                p.x += Math.sin(time * 0.01 + p.twinklePhase) * 0.2 * volumeFactor;

                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                const twinkle = Math.sin(time * p.twinkleSpeed + p.twinklePhase) * 0.5 + 0.5;
                const alpha = p.alpha * (0.5 + twinkle * 0.5) * (0.4 + volumeFactor * 0.6);

                ctx.beginPath();
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 4);
                grad.addColorStop(0, `rgba(180, 255, 210, ${alpha})`);
                grad.addColorStop(0.4, `rgba(87, 242, 135, ${alpha * 0.5})`);
                grad.addColorStop(1, 'rgba(87, 242, 135, 0)');
                ctx.fillStyle = grad;
                ctx.arc(p.x, p.y, p.radius * 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.fillStyle = `rgba(220, 255, 230, ${alpha})`;
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawGlow(volumeFactor) {
            const WIDTH = canvas.width;
            const HEIGHT = canvas.height;
            const centerX = WIDTH / 2;
            const centerY = HEIGHT * 0.7;
            const radius = Math.max(WIDTH, HEIGHT) * 0.5;

            const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
            const alpha = 0.08 + volumeFactor * 0.12;
            grad.addColorStop(0, `rgba(87, 242, 135, ${alpha})`);
            grad.addColorStop(0.5, `rgba(87, 242, 135, ${alpha * 0.3})`);
            grad.addColorStop(1, 'rgba(87, 242, 135, 0)');

            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
        }

        let time = 0;
        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);

            const WIDTH = canvas.width;
            const HEIGHT = canvas.height;

            ctx.fillStyle = 'rgba(13, 14, 18, 0.25)';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            const isPlaying = !audio.paused && !audio.ended;
            const volumeFactor = isPlaying ? Math.max(0.3, volume) : 0.3;

            time += 1;

            drawGlow(volumeFactor);

            for (const wave of waves) {
                drawWave(wave, time, volumeFactor);
            }

            drawParticles(time, volumeFactor);
        }

        // УПРАВЛЕНИЕ ВИДЕО
        function showVideo(videoId) {
            youtubeBg.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&loop=1&playlist=${videoId}&controls=0&showinfo=0&mute=1&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            youtubeBg.classList.add('visible');
        }

        function hideVideo() {
            youtubeBg.classList.remove('visible');
            setTimeout(() => {
                youtubeBg.innerHTML = '';
            }, 500);
        }

        // ПЛЕЕР
        function renderTrackList() {
            trackList.innerHTML = '';
            const tracks = getCurrentTracks();
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item' + (index === currentTrackIndex ? ' active' : '');
                item.innerHTML = `
                    <span class="track-number">${String(index + 1).padStart(2, '0')}</span>
                    <span class="track-name">${track.name} — ${track.artist}</span>
                `;
                item.addEventListener('click', () => loadTrack(index));
                trackList.appendChild(item);
            });
        }

        function loadTrack(index) {
            const wasPlaying = !audio.paused;
            currentTrackIndex = index;
            const track = getCurrentTracks()[currentTrackIndex];
            audio.src = track.src;
            trackSubtitle.textContent = `${track.artist} — ${track.name}`;
            renderTrackList();
            
            // Управление видео
            if (track.videoId) {
                showVideo(track.videoId);
            } else {
                hideVideo();
            }
            
            if (wasPlaying) {
                audio.play().catch(e => console.warn('Play error:', e));
            }
        }

        function nextTrack() {
            const tracks = getCurrentTracks();
            currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            loadTrack(currentTrackIndex);
            audio.play().catch(e => console.warn('Play error:', e));
        }

        function prevTrack() {
            const tracks = getCurrentTracks();
            currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
            loadTrack(currentTrackIndex);
            audio.play().catch(e => console.warn('Play error:', e));
        }

        function togglePlay() {
            if (audio.paused) {
                if (!audio.src) loadTrack(0);
                audio.play()
                    .then(() => {
                        playBtn.innerText = 'PAUSE';
                        playBtn.style.backgroundColor = '#ff4757';
                        playBtn.style.boxShadow = '0 4px 15px rgba(255, 71, 87, 0.4)';
                    })
                    .catch(e => console.warn('Play error:', e));
            } else {
                audio.pause();
                playBtn.innerText = 'PLAY';
                playBtn.style.backgroundColor = '#57f287';
                playBtn.style.boxShadow = '0 4px 15px rgba(87, 242, 135, 0.4)';
            }
        }

        function updateProgress(e) {
            const { duration, currentTime } = e.target;
            if (!duration || !isFinite(duration)) return;
            const progressPercent = (currentTime / duration) * 100;
            progress.style.width = `${progressPercent}%`;
            const formatTime = (time) => Math.floor(time / 60) + ':' + String(Math.floor(time % 60)).padStart(2, '0');
            currentTimeEl.innerText = formatTime(currentTime);
            durationEl.innerText = formatTime(duration);
        }

        function setProgress(e) {
            const rect = this.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const duration = audio.duration;
            if (!duration || !isFinite(duration)) return;
            audio.currentTime = (clickX / rect.width) * duration;
        }

        // ========== ГРОМКОСТЬ: ПЕРЕТАСКИВАНИЕ ==========
        function setVolumeFromPosition(clientX) {
            const rect = volumeContainer.getBoundingClientRect();
            let clickX = clientX - rect.left;
            clickX = Math.max(0, Math.min(rect.width, clickX));
            volume = clickX / rect.width;
            audio.volume = volume;
            updateVolumeUI();
        }

        let isDraggingVolume = false;

        // Mouse events
        volumeThumb.addEventListener('mousedown', (e) => {
            isDraggingVolume = true;
            volumeThumb.classList.add('dragging');
            e.preventDefault();
        });

        volumeContainer.addEventListener('mousedown', (e) => {
            if (e.target !== volumeThumb) {
                setVolumeFromPosition(e.clientX);
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isDraggingVolume) {
                setVolumeFromPosition(e.clientX);
            }
        });

        document.addEventListener('mouseup', () => {
            if (isDraggingVolume) {
                isDraggingVolume = false;
                volumeThumb.classList.remove('dragging');
            }
        });

        // Touch events (для мобильных)
        volumeThumb.addEventListener('touchstart', (e) => {
            isDraggingVolume = true;
            volumeThumb.classList.add('dragging');
            e.preventDefault();
        });

        document.addEventListener('touchmove', (e) => {
            if (isDraggingVolume && e.touches.length > 0) {
                setVolumeFromPosition(e.touches[0].clientX);
            }
        });

        document.addEventListener('touchend', () => {
            if (isDraggingVolume) {
                isDraggingVolume = false;
                volumeThumb.classList.remove('dragging');
            }
        });

        function updateVolumeUI() {
            const percent = Math.round(volume * 100);
            volumeLevel.style.width = `${percent}%`;
            volumeThumb.style.left = `${percent}%`;
            volumeValue.textContent = `${percent}%`;
            if (volume === 0) volumeIcon.textContent = '🔇';
            else if (volume < 0.5) volumeIcon.textContent = '🔉';
            else volumeIcon.textContent = '🔊';
        }

        // ========== ВКЛАДКИ ==========
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                if (tab === currentTab) return;

                // Обновляем активную вкладку
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                currentTab = tab;
                currentTrackIndex = 0;

                const tracks = getCurrentTracks();
                audio.src = tracks[0].src;
                trackSubtitle.textContent = `${tracks[0].artist} — ${tracks[0].name}`;

                // Управление видео
                if (tracks[0].videoId) {
                    showVideo(tracks[0].videoId);
                } else {
                    hideVideo();
                }

                renderTrackList();

                // Если играло — продолжаем играть
                if (!audio.paused) {
                    audio.play().catch(e => console.warn('Play error:', e));
                }
            });
        });

        // События
        audio.addEventListener('ended', nextTrack);
        playBtn.addEventListener('click', togglePlay);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', updateProgress);
        progressContainer.addEventListener('click', setProgress);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);

        // Инициализация
        audio.volume = volume;
        updateVolumeUI();
        renderTrackList();
        const initialTracks = getCurrentTracks();
        trackSubtitle.textContent = initialTracks[0].artist + ' — ' + initialTracks[0].name;
        audio.src = initialTracks[0].src;
        
        if (!duration || !isFinite(duration)) return;

        // Запуск визуализатора
        drawVisualizer();
    </script>
</body>
</html>
