<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME NAHUI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d0e12;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
            position: relative;
        }
        #visualizer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.5; /* снижена яркость фона */
            pointer-events: none;
        }
        .player-card {
            background: linear-gradient(145deg, rgba(20, 22, 29, 0.92), rgba(27, 30, 38, 0.92));
            border: 2px solid #57f287;
            box-shadow: 0 0 20px rgba(87, 242, 135, 0.3);
            border-radius: 12px;
            padding: 30px;
            width: 380px;
            text-align: center;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(6px);
        }
        .title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #57f287;
        }
        .subtitle { font-size: 0.8rem; color: #8a8f98; margin-bottom: 20px; }
        .track-list {
            background: rgba(27, 30, 38, 0.85);
            border: 1px solid #2c2f36;
            border-radius: 8px;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
        }
        .track-list::-webkit-scrollbar { width: 4px; }
        .track-list::-webkit-scrollbar-track { background: #1b1e26; }
        .track-list::-webkit-scrollbar-thumb { background: #57f287; border-radius: 2px; }
        .track-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #8a8f98;
            transition: all 0.2s ease;
            border-bottom: 1px solid #2c2f36;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .track-item:last-child { border-bottom: none; }
        .track-item:hover { background: #2c2f36; color: #fff; }
        .track-item.active {
            background: rgba(87, 242, 135, 0.1);
            color: #57f287;
            border-left: 3px solid #57f287;
        }
        .track-item .track-number { font-size: 0.7rem; opacity: 0.5; min-width: 20px; }
        .track-item .track-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .controls { margin-bottom: 20px; }
        .play-btn {
            background-color: #57f287;
            color: #0d0e12;
            border: none;
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(87, 242, 135, 0.4);
            font-family: 'Courier New', Courier, monospace;
        }
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 25px rgba(87, 242, 135, 0.6);
        }
        .progress-container {
            background-color: #2c2f36;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            height: 6px;
            width: 100%;
            position: relative;
        }
        .progress {
            background-color: #57f287;
            border-radius: 5px;
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #8a8f98;
            margin-bottom: 20px;
        }
        .volume-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .volume-icon { font-size: 1rem; color: #57f287; min-width: 20px; }
        .volume-slider-container {
            flex: 1;
            position: relative;
            height: 6px;
            background-color: #2c2f36;
            border-radius: 5px;
            cursor: pointer;
        }
        .volume-level {
            background-color: #57f287;
            border-radius: 5px;
            height: 100%;
            width: 80%;
            transition: width 0.1s linear;
        }
        .volume-value {
            font-size: 0.7rem;
            color: #8a8f98;
            min-width: 35px;
            text-align: right;
        }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .nav-btn {
            background: #2c2f36;
            color: #57f287;
            border: 1px solid #57f287;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-family: 'Courier New', Courier, monospace;
        }
        .nav-btn:hover {
            background: #57f287;
            color: #0d0e12;
            box-shadow: 0 0 15px rgba(87, 242, 135, 0.4);
        }
    </style>
</head>
<body>

    <canvas id="visualizer"></canvas>

    <div class="player-card">
        <div class="title">WELCOME NAHUI</div>
        <div class="subtitle" id="trackSubtitle">CHILL</div>

        <div class="track-list" id="trackList"></div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" title="Предыдущий">◄</button>
            <button class="nav-btn" id="nextBtn" title="Следующий">►</button>
        </div>

        <audio id="audio" preload="auto"></audio>

        <div class="controls">
            <button class="play-btn" id="playBtn">PLAY</button>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>

        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <div class="volume-section">
            <span class="volume-icon" id="volumeIcon">🔊</span>
            <div class="volume-slider-container" id="volumeContainer">
                <div class="volume-level" id="volumeLevel"></div>
            </div>
            <span class="volume-value" id="volumeValue">80%</span>
        </div>
    </div>

    <script>
        // ============ СПИСОК ТРЕКОВ ============
        const tracks = [
            { name: "Mirage", artist: "Creepy Nuts", src: "https://cdn11.deliciousoranges.com/s1/get/music/20250711/Creepy_Nuts_-_Mirage_79280769.mp3" },
            { name: "Don't tell your dreams", artist: "LOVIXX, STOSLIV", src: "https://cdn5.deliciousoranges.com/s1/get/music/20260621/LOVIXX_-_Dont_tell_your_dreams_81746473.mp3" },
            { name: "Hilfe", artist: "Lostboi Lino", src: "https://s1.deliciouspeaches.com/get/music/20250821/Lostboi_Lino_-_Hilfe_79520224.mp3" },
            { name: "Hurricane", artist: "BUNT. feat. HON, SMBDY", src: "https://s3.deliciouspeaches.com/get/music/20220126/BUNT_feat_HON_SMBDY_-_Hurricane_73712791.mp3" },
            { name: "Make It Bun Dem", artist: "Skrillex", src: "https://cdn2.deliciousoranges.com/s1/get/music/20170905/Skrillex_-_Make_It_Bun_Dem_48256501.mp3" }
        ];

        let currentTrackIndex = 0;
        let volume = 0.8;

        // ============ DOM ============
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const progress = document.getElementById('progress');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const trackList = document.getElementById('trackList');
        const trackSubtitle = document.getElementById('trackSubtitle');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const volumeContainer = document.getElementById('volumeContainer');
        const volumeLevel = document.getElementById('volumeLevel');
        const volumeValue = document.getElementById('volumeValue');
        const volumeIcon = document.getElementById('volumeIcon');

        // ============ ВИЗУАЛИЗАТОР ============
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        let animationId = null;

        const BAR_COUNT = 64;
        let smoothedBars = [];
        for (let i = 0; i < BAR_COUNT; i++) smoothedBars.push(0);

        // ФИКСИРОВАННЫЕ параметры для каждого столбика — чтобы они стояли на месте
        // Каждый столбик имеет свою фазу и скорость колебаний
        const barPhases = [];
        const barSpeeds = [];
        const barSeeds = [];
        for (let i = 0; i < BAR_COUNT; i++) {
            // Псевдослучайные, но фиксированные значения (детерминированные от индекса)
            barPhases.push((i * 2.37) % (Math.PI * 2));
            barSpeeds.push(0.6 + ((i * 13) % 17) / 20); // скорость от 0.6 до 1.45
            barSeeds.push(((i * 7 + 3) % 11) / 11); // "шумовой" сид
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Генерация значений столбиков — БЕЗ бегущей волны
        let globalTime = 0;
        function generateBars() {
            globalTime += 0.04;
            const isPlaying = !audio.paused && !audio.ended;
            const intensity = isPlaying ? volume : 0.15;

            for (let i = 0; i < BAR_COUNT; i++) {
                // Каждый столбик колеблется в своём ритме (фиксированная скорость и фаза)
                const phase = barPhases[i];
                const speed = barSpeeds[i];
                const seed = barSeeds[i];

                // Колебания — синус от глобального времени с индивидуальной скоростью
                const wave1 = Math.sin(globalTime * speed + phase) * 0.5 + 0.5;
                const wave2 = Math.sin(globalTime * speed * 1.7 + phase * 2.1) * 0.3 + 0.5;
                // Псевдослучайный "шум", привязанный к столбику и времени
                const noise = (Math.sin(globalTime * 3.1 + seed * 100) * 0.5 + 0.5) * 0.25;

                // Низкие частоты (слева) чуть выше — имитация басов
                const freqFactor = 1 - (i / BAR_COUNT) * 0.5;

                let target = (wave1 * 0.55 + wave2 * 0.3 + noise * 0.15) * freqFactor * intensity;

                // Плавное сглаживание
                smoothedBars[i] += (target - smoothedBars[i]) * 0.22;
            }
        }

        // Рисование
        function drawVisualizer() {
            animationId = requestAnimationFrame(drawVisualizer);

            const WIDTH = canvas.width;
            const HEIGHT = canvas.height;

            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            generateBars();
            const barValues = smoothedBars.slice();

            const isPlaying = !audio.paused && !audio.ended;
            const volumeFactor = isPlaying ? Math.max(0.2, volume) : 0.3;

            const gap = 4;
            const totalGap = gap * (BAR_COUNT - 1);
            const barWidth = (WIDTH - totalGap) / BAR_COUNT;

            for (let i = 0; i < BAR_COUNT; i++) {
                const value = barValues[i] * volumeFactor;
                const barHeight = value * HEIGHT * 0.85;

                if (barHeight < 1) continue;

                // СНИЖЕННАЯ ЯРКОСТЬ — альфа-каналы уменьшены
                const gradient = ctx.createLinearGradient(0, HEIGHT, 0, HEIGHT - barHeight);
                gradient.addColorStop(0, 'rgba(87, 242, 135, 0.55)');   // было 0.95
                gradient.addColorStop(0.5, 'rgba(87, 242, 135, 0.28)'); // было 0.5
                gradient.addColorStop(1, 'rgba(87, 242, 135, 0.02)');   // было 0.05

                ctx.fillStyle = gradient;
                ctx.shadowColor = '#57f287';
                ctx.shadowBlur = 6; // было 12

                const x = i * (barWidth + gap);
                ctx.fillRect(x, HEIGHT - barHeight, barWidth, barHeight);
            }
            ctx.shadowBlur = 0;
        }

        // ============ ПЛЕЕР ============
        function renderTrackList() {
            trackList.innerHTML = '';
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item' + (index === currentTrackIndex ? ' active' : '');
                item.innerHTML = `
                    <span class="track-number">${String(index + 1).padStart(2, '0')}</span>
                    <span class="track-name">${track.name} — ${track.artist}</span>
                `;
                item.addEventListener('click', () => loadTrack(index));
                trackList.appendChild(item);
            });
        }

        function loadTrack(index) {
            const wasPlaying = !audio.paused;
            currentTrackIndex = index;
            const track = tracks[currentTrackIndex];
            audio.src = track.src;
            trackSubtitle.textContent = `${track.artist} — ${track.name}`;
            renderTrackList();
            if (wasPlaying) {
                audio.play().catch(e => console.warn('Play error:', e));
            }
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            loadTrack(currentTrackIndex);
            audio.play().catch(e => console.warn('Play error:', e));
        }

        function prevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
            loadTrack(currentTrackIndex);
            audio.play().catch(e => console.warn('Play error:', e));
        }

        function togglePlay() {
            if (audio.paused) {
                if (!audio.src) loadTrack(0);
                audio.play()
                    .then(() => {
                        playBtn.innerText = 'PAUSE';
                        playBtn.style.backgroundColor = '#ff4757';
                        playBtn.style.boxShadow = '0 4px 15px rgba(255, 71, 87, 0.4)';
                    })
                    .catch(e => console.warn('Play error:', e));
            } else {
                audio.pause();
                playBtn.innerText = 'PLAY';
                playBtn.style.backgroundColor = '#57f287';
                playBtn.style.boxShadow = '0 4px 15px rgba(87, 242, 135, 0.4)';
            }
        }

        function updateProgress(e) {
            const { duration, currentTime } = e.srcElement;
            if (!duration) return;
            const progressPercent = (currentTime / duration) * 100;
            progress.style.width = `${progressPercent}%`;
            const formatTime = (time) => Math.floor(time / 60) + ':' + String(Math.floor(time % 60)).padStart(2, '0');
            currentTimeEl.innerText = formatTime(currentTime);
            durationEl.innerText = formatTime(duration);
        }

        function setProgress(e) {
            const width = this.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        }

        function setVolume(e) {
            const width = volumeContainer.clientWidth;
            const clickX = e.offsetX;
            volume = Math.max(0, Math.min(1, clickX / width));
            audio.volume = volume;
            updateVolumeUI();
        }

        function updateVolumeUI() {
            const percent = Math.round(volume * 100);
            volumeLevel.style.width = `${percent}%`;
            volumeValue.textContent = `${percent}%`;
            if (volume === 0) volumeIcon.textContent = '🔇';
            else if (volume < 0.5) volumeIcon.textContent = '🔉';
            else volumeIcon.textContent = '🔊';
        }

        // События
        audio.addEventListener('ended', nextTrack);
        playBtn.addEventListener('click', togglePlay);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', updateProgress);
        progressContainer.addEventListener('click', setProgress);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        volumeContainer.addEventListener('click', setVolume);

        // Инициализация
        audio.volume = volume;
        updateVolumeUI();
        renderTrackList();
        trackSubtitle.textContent = tracks[0].artist + ' — ' + tracks[0].name;
        audio.src = tracks[0].src;

        // Запуск визуализатора
        drawVisualizer();
    </script>
</body>
</html>
