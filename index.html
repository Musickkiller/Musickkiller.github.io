<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME NAHUI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>">
    <style>
        /* CSS VARIABLES ДЛЯ ТЕМ */
        :root {
            --primary: #57f287;
            --primary-rgb: 87, 242, 135;
            --secondary: #78ffaa;
            --bg-dark: #0d0e12;
            --bg-card: rgba(20, 22, 29, 0.92);
            --bg-panel: rgba(27, 30, 38, 0.85);
            --border: #2c2f36;
            --text: #fff;
            --text-dim: #8a8f98;
        }
        [data-theme="blue"] {
            --primary: #4dabf7;
            --primary-rgb: 77, 171, 247;
            --secondary: #74c0fc;
        }
        [data-theme="purple"] {
            --primary: #b197fc;
            --primary-rgb: 177, 151, 252;
            --secondary: #d0bfff;
        }
        [data-theme="red"] {
            --primary: #ff6b6b;
            --primary-rgb: 255, 107, 107;
            --secondary: #ffa8a8;
        }
        [data-theme="rad"] {
            --primary: #ff00ff;
            --primary-rgb: 255, 0, 255;
            --secondary: #00ffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* КАСТОМНЫЙ КУРСОР */
        body { cursor: none; }
        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, width 0.2s, height 0.2s;
            box-shadow: 0 0 10px var(--primary);
        }
        .custom-cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .custom-cursor.clicking {
            width: 15px;
            height: 15px;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text);
            overflow: hidden;
            position: relative;
        }
        
        /* CRT ЭФФЕКТ */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9998;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
        }
        .crt-overlay::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.3) 100%);
        }

        /* МАТРИЧНЫЙ ДОЖДЬ */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
        }

        #visualizer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        /* ВИДЕО ФОН */
        #video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            overflow: hidden;
            background: #000;
        }
        #video-bg.visible {
            opacity: 1;
        }
        #video-bg video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            pointer-events: none;
        }
        
        /* Затемнение поверх видео */
        #video-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            pointer-events: none;
        }

        /* ЭФФЕКТ ВЗЛОМА */
        .hack-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            color: var(--primary);
            padding: 40px;
            transition: opacity 0.5s;
        }
        .hack-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .hack-text {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            max-width: 800px;
            text-align: left;
        }
        .hack-cursor {
            display: inline-block;
            width: 10px;
            height: 16px;
            background: var(--primary);
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .player-card {
            background: linear-gradient(145deg, var(--bg-card), rgba(27, 30, 38, 0.92));
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.3);
            border-radius: 12px;
            padding: 30px;
            width: 380px;
            text-align: center;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(6px);
            transition: box-shadow 0.1s;
            overflow: visible;
        }

        .title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: var(--primary);
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        
        /* ГЛИТЧ ЭФФЕКТ */
        .title.glitch::before,
        .title.glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .title.glitch::before {
            animation: glitch-1 0.3s infinite;
            color: #ff00ff;
            z-index: -1;
        }
        .title.glitch::after {
            animation: glitch-2 0.3s infinite;
            color: #00ffff;
            z-index: -2;
        }
        @keyframes glitch-1 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(20% 0 60% 0); transform: translate(-2px, 2px); }
            40% { clip-path: inset(40% 0 40% 0); transform: translate(2px, -2px); }
            60% { clip-path: inset(60% 0 20% 0); transform: translate(-2px, -2px); }
            80% { clip-path: inset(80% 0 0% 0); transform: translate(2px, 2px); }
        }
        @keyframes glitch-2 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(60% 0 20% 0); transform: translate(2px, -2px); }
            40% { clip-path: inset(40% 0 40% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(20% 0 60% 0); transform: translate(2px, 2px); }
            80% { clip-path: inset(0% 0 80% 0); transform: translate(-2px, -2px); }
        }

        .subtitle { 
            font-size: 0.8rem; 
            color: var(--text-dim); 
            margin-bottom: 20px; 
            min-height: 1.2em;
        }

        /* ПОИСК */
        .search-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-input:focus {
            border-color: var(--primary);
        }
        .search-input::placeholder {
            color: var(--text-dim);
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 10px 15px;
            background: var(--bg-panel);
            color: var(--text-dim);
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .tab-btn:hover {
            background: var(--border);
            color: var(--text);
        }
        .tab-btn.active {
            background: rgba(var(--primary-rgb), 0.15);
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .track-list {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
        }
        .track-list::-webkit-scrollbar { width: 4px; }
        .track-list::-webkit-scrollbar-track { background: #1b1e26; }
        .track-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }
        .track-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-dim);
            transition: all 0.2s ease;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .track-item:last-child { border-bottom: none; }
        .track-item:hover { background: var(--border); color: var(--text); }
        .track-item.active {
            background: rgba(var(--primary-rgb), 0.1);
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }
        .track-item.secret {
            background: rgba(255, 215, 0, 0.05);
            border-left: 3px solid gold;
        }
        .track-item .track-number { font-size: 0.7rem; opacity: 0.5; min-width: 20px; }
        .track-item .track-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .controls { margin-bottom: 20px; }
        .play-btn {
            background-color: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(var(--primary-rgb), 0.4);
            font-family: 'Courier New', Courier, monospace;
        }
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 25px rgba(var(--primary-rgb), 0.6);
        }

        .progress-container {
            background-color: var(--border);
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            height: 6px;
            width: 100%;
            position: relative;
        }
        .progress {
            background-color: var(--primary);
            border-radius: 5px;
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 20px;
        }
        .volume-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .volume-icon { font-size: 1rem; color: var(--primary); min-width: 20px; }
        .volume-slider-container {
            flex: 1;
            position: relative;
            height: 6px;
            background-color: var(--border);
            border-radius: 5px;
            cursor: pointer;
        }
        .volume-level {
            background-color: var(--primary);
            border-radius: 5px;
            height: 100%;
            width: 80%;
            transition: width 0.05s linear;
            pointer-events: none;
        }
        .volume-thumb {
            position: absolute;
            top: 50%;
            left: 80%;
            width: 14px;
            height: 14px;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px rgba(var(--primary-rgb), 0.5);
            cursor: grab;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            z-index: 2;
        }
        .volume-thumb:hover {
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 14px rgba(var(--primary-rgb), 0.8);
        }
        .volume-thumb.dragging {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.4);
            box-shadow: 0 0 18px rgba(var(--primary-rgb), 1);
        }
        .volume-value {
            font-size: 0.7rem;
            color: var(--text-dim);
            min-width: 35px;
            text-align: right;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav-btn {
            background: var(--border);
            color: var(--primary);
            border: 1px solid var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-family: 'Courier New', Courier, monospace;
        }
        .nav-btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.4);
        }
        .nav-btn.active {
            background: var(--primary);
            color: var(--bg-dark);
        }

        /* НИЖНИЕ КНОПКИ */
        .bottom-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        .bottom-btn {
            background: var(--bg-panel);
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }
        .bottom-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ЦИТАТА */
        .quote {
            margin-top: 15px;
            font-size: 0.7rem;
            color: var(--text-dim);
            font-style: italic;
            min-height: 1.5em;
            opacity: 0.7;
        }

        /* ПАНЕЛЬ ИСТОРИИ */
        .history-panel {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--primary);
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 10;
        }
        .history-panel.visible { display: block; }
        .history-title {
            color: var(--primary);
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .history-item {
            padding: 6px 10px;
            font-size: 0.75rem;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        .history-item:hover {
            color: var(--primary);
            background: rgba(var(--primary-rgb), 0.1);
        }

        /* ========== РУЛЕТКА ========== */
        .roulette-wrapper-outer {
            position: absolute;
            top: -180px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% + 60px);
            max-width: 440px;
            z-index: 100;
            pointer-events: none;
        }
        
        .roulette-container {
            background: linear-gradient(145deg, var(--bg-card), rgba(27, 30, 38, 0.98));
            border: 2px solid var(--primary);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(var(--primary-rgb), 0.5);
            opacity: 0;
            transform: translateY(100px) scale(0.9);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
        }
        
        .roulette-container.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        
        .roulette-title {
            color: var(--primary);
            font-size: 1rem;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(var(--primary-rgb), 0.5);
        }
        
        .roulette-window {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-panel);
            height: 80px;
        }
        
        /* Указатель сверху */
        .roulette-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 16px solid var(--primary);
            z-index: 10;
            filter: drop-shadow(0 0 10px rgba(var(--primary-rgb), 0.8));
        }
        
        /* Линия указателя */
        .roulette-pointer::after {
            content: '';
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, var(--primary), transparent);
            opacity: 0.5;
        }
        
        .roulette-track-list {
            display: flex;
            gap: 0;
            will-change: transform;
            height: 100%;
            align-items: center;
        }
        
        .roulette-track-item {
            flex: 0 0 140px;
            padding: 12px 10px;
            text-align: center;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-dim);
            transition: all 0.3s;
            height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .roulette-track-item:last-child {
            border-right: none;
        }
        .roulette-track-item.winner {
            background: rgba(var(--primary-rgb), 0.3);
            color: var(--primary);
            font-weight: bold;
            box-shadow: inset 0 0 20px rgba(var(--primary-rgb), 0.4);
            border: 1px solid var(--primary);
            transform: scale(1.05);
        }
        .roulette-track-item .track-title {
            font-weight: bold;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.8rem;
        }
        .roulette-track-item .track-artist {
            font-size: 0.65rem;
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .roulette-result {
            margin-top: 15px;
            padding: 12px;
            background: rgba(var(--primary-rgb), 0.15);
            border: 1px solid var(--primary);
            border-radius: 6px;
            text-align: center;
            color: var(--primary);
            font-size: 0.85rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s;
        }
        .roulette-result.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* RIPPLE ЭФФЕКТ */
        .ripple {
            position: fixed;
            border-radius: 50%;
            background: rgba(var(--primary-rgb), 0.3);
            pointer-events: none;
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out;
            z-index: 9997;
        }
        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <canvas id="matrix-canvas"></canvas>
    <div class="custom-cursor" id="cursor"></div>
    
    <div class="hack-overlay" id="hackOverlay">
        <div class="hack-text" id="hackText"></div>
    </div>

    <canvas id="visualizer"></canvas>
    <div id="video-bg"></div>

    <div class="player-card" id="playerCard">
        <div class="title" id="titleText" data-text="WELCOME NAHUI">WELCOME NAHUI</div>
        <div class="subtitle" id="trackSubtitle">CHILL</div>

        <input type="text" class="search-input" id="searchInput" placeholder=" Поиск треков...">

        <div class="tabs">
            <button class="tab-btn active" data-tab="chill">Chill</button>
            <button class="tab-btn" data-tab="nostalgia">Ностальгия</button>
        </div>

        <div class="track-list" id="trackList"></div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" title="Предыдущий (←)">◄</button>
            <button class="nav-btn" id="rouletteBtn" title="Рулетка (R)"></button>
            <button class="nav-btn" id="loopBtn" title="Режим повтора (L)">🔁</button>
            <button class="nav-btn" id="nextBtn" title="Следующий (→)">►</button>
        </div>

        <audio id="audio" preload="auto"></audio>

        <div class="controls">
            <button class="play-btn" id="playBtn">PLAY</button>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>

        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <div class="volume-section">
            <span class="volume-icon" id="volumeIcon"></span>
            <div class="volume-slider-container" id="volumeContainer">
                <div class="volume-level" id="volumeLevel"></div>
                <div class="volume-thumb" id="volumeThumb"></div>
            </div>
            <span class="volume-value" id="volumeValue">80%</span>
        </div>

        <div class="bottom-controls">
            <button class="bottom-btn" id="historyBtn">📜 История</button>
            <button class="bottom-btn" id="themeBtn">🎨 Тема</button>
        </div>

        <div class="quote" id="quote"></div>

        <div class="history-panel" id="historyPanel">
            <div class="history-title">История прослушиваний</div>
            <div id="historyList"></div>
        </div>
        
        <!-- РУЛЕТКА -->
        <div class="roulette-wrapper-outer">
            <div class="roulette-container" id="rouletteContainer">
                <div class="roulette-title">🎰 РУЛЕТКА 🎰</div>
                <div class="roulette-window">
                    <div class="roulette-pointer"></div>
                    <div class="roulette-track-list" id="rouletteTrackList"></div>

        // ========== TYPEWRITER EFFECT ==========

        // ========== ВИЗУАЛИЗАТОР ==========
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

        }

        const waves = [
            { y: 0.65, amplitude: 60, frequency: 0.008, speed: 0.015, color1: 'rgba(var(--primary-rgb), 0.18)', color2: 'rgba(var(--primary-rgb), 0.0)', phase: 0 },
            { y: 0.72, amplitude: 80, frequency: 0.006, speed: 0.010, color1: 'rgba(var(--primary-rgb), 0.25)', color2: 'rgba(var(--primary-rgb), 0.0)', phase: 1.5 },
            { y: 0.80, amplitude: 50, frequency: 0.012, speed: 0.020, color1: 'rgba(var(--primary-rgb), 0.30)', color2: 'rgba(var(--primary-rgb), 0.0)', phase: 3.0 },
            { y: 0.88, amplitude: 35, frequency: 0.015, speed: 0.025, color1: 'rgba(var(--primary-rgb), 0.20)', color2: 'rgba(var(--primary-rgb), 0.0)', phase: 4.5 }
        ];

        let particles = [];
        const PARTICLE_COUNT = 50;

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.8 + 0.4,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3 - 0.15,
                    alpha: Math.random() * 0.5 + 0.2,
                    twinkleSpeed: Math.random() * 0.03 + 0.01,
                    twinklePhase: Math.random() * Math.PI * 2,
                    layer: Math.random()
                });
            }
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function drawWave(wave, time, volumeFactor) {
            const WIDTH = canvas.width;
            const HEIGHT = canvas.height;
            const baseY = HEIGHT * wave.y;
            const amp = wave.amplitude * volumeFactor;

            ctx.beginPath();
            ctx.moveTo(0, HEIGHT);

            for (let x = 0; x <= WIDTH; x += 4) {
                const y = baseY +
                    Math.sin(x * wave.frequency + time * wave.speed + wave.phase) * amp +
                    Math.sin(x * wave.frequency * 2.3 + time * wave.speed * 1.5) * amp * 0.3 +
                    Math.sin(x * wave.frequency * 0.5 + time * wave.speed * 0.7) * amp * 0.5;

                if (x === 0) ctx.lineTo(0, y);
                else ctx.lineTo(x, y);
            }

            ctx.lineTo(WIDTH, HEIGHT);
            ctx.closePath();

            const primaryRGB = getComputedStyle(document.documentElement).getPropertyValue('--primary-rgb').trim();
            const gradient = ctx.createLinearGradient(0, baseY - amp, 0, HEIGHT);
            gradient.addColorStop(0, `rgba(${primaryRGB}, ${0.18 * volumeFactor})`);
            gradient.addColorStop(1, `rgba(${primaryRGB}, 0)`);
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        function drawParticles(time, volumeFactor) {
            const primaryRGB = getComputedStyle(document.documentElement).getPropertyValue('--primary-rgb').trim();
            
            for (const p of particles) {
                const parallaxFactor = 0.5 + p.layer * 0.5;
                p.x += p.speedX * parallaxFactor;
                p.y += p.speedY * parallaxFactor;
                p.x += Math.sin(time * 0.01 + p.twinklePhase) * 0.2 * volumeFactor;

                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                const twinkle = Math.sin(time * p.twinkleSpeed + p.twinklePhase) * 0.5 + 0.5;
                const alpha = p.alpha * (0.5 + twinkle * 0.5) * (0.4 + volumeFactor * 0.6);

                ctx.beginPath();
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 4);
                grad.addColorStop(0, `rgba(${primaryRGB}, ${alpha})`);
                grad.addColorStop(0.4, `rgba(${primaryRGB}, ${alpha * 0.5})`);
                grad.addColorStop(1, `rgba(${primaryRGB}, 0)`);
                ctx.fillStyle = grad;
                ctx.arc(p.x, p.y, p.radius * 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawGlow(volumeFactor) {
            const WIDTH = canvas.width;
            const HEIGHT = canvas.height;
            const centerX = WIDTH / 2;
            const centerY = HEIGHT * 0.7;
            const radius = Math.max(WIDTH, HEIGHT) * 0.5;
            const primaryRGB = getComputedStyle(document.documentElement).getPropertyValue('--primary-rgb').trim();

            const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
            const alpha = 0.08 + volumeFactor * 0.12;
            grad.addColorStop(0, `rgba(${primaryRGB}, ${alpha})`);
            grad.addColorStop(0.5, `rgba(${primaryRGB}, ${alpha * 0.3})`);
            grad.addColorStop(1, `rgba(${primaryRGB}, 0)`);

            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
        }

        let time = 0;
        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);

            const WIDTH = canvas.width;
            const HEIGHT = canvas.height;

            ctx.fillStyle = 'rgba(13, 14, 18, 0.25)';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            const isPlaying = !audio.paused && !audio.ended;
            const volumeFactor = isPlaying ? Math.max(0.3, volume) : 0.3;

            time += 1;

            drawGlow(volumeFactor);
            for (const wave of waves) drawWave(wave, time, volumeFactor);
            drawParticles(time, volumeFactor);

        // ========== МАТРИЧНЫЙ ДОЖДЬ ==========
        const matrixCanvas = document.getElementById('matrix-canvas');

        // ========== УПРАВЛЕНИЕ ВИДЕО ==========
        let videoLoadAttempts = 0;
        const MAX_VIDEO_ATTEMPTS = 3;
        
        function showVideo(videoSrc) {
            console.log('🎬 Попытка показать видео:', videoSrc, '(попытка', videoLoadAttempts + 1, ')');
            
            // Очищаем предыдущее видео
            videoBg.innerHTML = '';
            
            const video = document.createElement('video');
            video.src = videoSrc;
            video.autoplay = true;
            video.loop = true;
            video.muted = true;
            video.playsInline = true;
            video.setAttribute('playsinline', '');
            video.setAttribute('webkit-playsinline', '');
            video.setAttribute('muted', '');
            video.crossOrigin = "anonymous";
            
            let videoLoaded = false;
            
            // Обработка успешной загрузки
            const onCanPlay = () => {
                if (videoLoaded) return;
                videoLoaded = true;
                console.log('✅ Видео готово к воспроизведению');
                videoLoadAttempts = 0; // Сбрасываем счетчик
                
                video.play().then(() => {
                    console.log('▶️ Видео запущено');
                    videoBg.classList.add('visible');
                }).catch(err => {
                    console.warn('⚠️ Ошибка автозапуска:', err);
                    videoBg.classList.add('visible');
                });
                
                // Удаляем обработчики
                video.removeEventListener('canplay', onCanPlay);
                video.removeEventListener('error', onError);
            };
            
            // Обработка ошибки
            const onError = (e) => {
                if (videoLoaded) return;
                console.error(' Ошибка загрузки видео:', e);
                videoLoadAttempts++;
                
                if (videoLoadAttempts < MAX_VIDEO_ATTEMPTS) {
                    console.log('🔄 Повторная попытка загрузки через 2 секунды...');
                    setTimeout(() => {
                        showVideo(videoSrc);
                    }, 2000);
                } else {
                    console.warn('️ Видео не удалось загрузить после', MAX_VIDEO_ATTEMPTS, 'попыток');
                    hideVideo();
                }
                
                video.removeEventListener('canplay', onCanPlay);
                video.removeEventListener('error', onError);
            };
            
            video.addEventListener('canplay', onCanPlay);
            video.addEventListener('error', onError);
            
            videoBg.appendChild(video);
            
            // Запускаем загрузку
            video.load();
            
            // Fallback - показываем через 1.5 секунды даже если не загрузилось
            setTimeout(() => {
                if (!videoLoaded && video.readyState >= 2) {
                    onCanPlay();
                }
            }, 1500);
            
            console.log('🎥 Видео добавлено в DOM');
        }

        function hideVideo() {
            videoBg.classList.remove('visible');
            setTimeout(() => {
                const video = videoBg.querySelector('video');

        // ========== ПЛЕЕР ==========
        function renderTrackList() {
            trackList.innerHTML = '';
            const tracks = getCurrentTracks();
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item' + (index === currentTrackIndex ? ' active' : '') + (track.secret ? ' secret' : '');

                item.addEventListener('click', () => loadTrack(index));
                trackList.appendChild(item);

        function loadTrack(index) {
            const wasPlaying = !audio.paused;
            currentTrackIndex = index;
            const tracks = getCurrentTracks();
            const track = tracks[currentTrackIndex];
            audio.src = track.src;
            
            typeWriter(`${track.artist} — ${track.name}`, trackSubtitle, 40);

                showVideo(track.videoSrc);

                console.log('🚫 Трек без видео');
                hideVideo();
            }
            
            if (wasPlaying) audio.play().catch(e => console.warn('Play error:', e));
        }

        function nextTrack() {
            const tracks = getCurrentTracks();
            if (loopMode === 'one') {
                audio.currentTime = 0;
                audio.play();
                return;
            }
            if (loopMode === 'shuffle') {
                currentTrackIndex = Math.floor(Math.random() * tracks.length);
            } else {
                currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            }
            loadTrack(currentTrackIndex);
            audio.play().catch(e => console.warn('Play error:', e));
        }

        function prevTrack() {
            const tracks = getCurrentTracks();
            currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
            loadTrack(currentTrackIndex);
            audio.play().catch(e => console.warn('Play error:', e));
        }

        function togglePlay() {
            if (audio.paused) {
                if (!audio.src) loadTrack(0);
                audio.play()
                    .then(() => {
                        playBtn.innerText = 'PAUSE';
                        playBtn.style.backgroundColor = '#ff4757';
                        playBtn.style.boxShadow = '0 4px 15px rgba(255, 71, 87, 0.4)';
                    })

                audio.pause();

                const primaryRGB = getComputedStyle(document.documentElement).getPropertyValue('--primary-rgb').trim();
                playBtn.style.backgroundColor = `rgb(${primaryRGB})`;
                playBtn.style.boxShadow = `0 4px 15px rgba(${primaryRGB}, 0.4)`;
            }
        }

        function updateProgress(e) {
            const { duration, currentTime } = e.target;
            if (!duration || !isFinite(duration)) return;
            const progressPercent = (currentTime / duration) * 100;
            progress.style.width = `${progressPercent}%`;
            const formatTime = (time) => Math.floor(time / 60) + ':' + String(Math.floor(time % 60)).padStart(2, '0');
            currentTimeEl.innerText = formatTime(currentTime);
            durationEl.innerText = formatTime(duration);
        }

        function setProgress(e) {
            const rect = this.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const duration = audio.duration;
            if (!duration || !isFinite(duration)) return;
            audio.currentTime = (clickX / rect.width) * duration;
        }

        // ========== ГРОМКОСТЬ ==========
        function setVolumeFromPosition(clientX) {
            const rect = volumeContainer.getBoundingClientRect();
            let clickX = clientX - rect.left;
            clickX = Math.max(0, Math.min(rect.width, clickX));
            volume = clickX / rect.width;
            audio.volume = volume;
            updateVolumeUI();
        }

        let isDraggingVolume = false;

        volumeThumb.addEventListener('mousedown', (e) => {
            isDraggingVolume = true;
            volumeThumb.classList.add('dragging');
            e.preventDefault();
        });

        volumeContainer.addEventListener('mousedown', (e) => {
            if (e.target !== volumeThumb) setVolumeFromPosition(e.clientX);
        });

        document.addEventListener('mousemove', (e) => {
            if (isDraggingVolume) setVolumeFromPosition(e.clientX);
        });

        document.addEventListener('mouseup', () => {
            if (isDraggingVolume) {
                isDraggingVolume = false;
                volumeThumb.classList.remove('dragging');
            }
        });

        volumeThumb.addEventListener('touchstart', (e) => {
            isDraggingVolume = true;
            volumeThumb.classList.add('dragging');
        });

        document.addEventListener('touchmove', (e) => {
            if (isDraggingVolume && e.touches.length > 0) {
                setVolumeFromPosition(e.touches[0].clientX);
            }
        });

        document.addEventListener('touchend', () => {
            if (isDraggingVolume) {
                isDraggingVolume = false;
                volumeThumb.classList.remove('dragging');
            }
        });

        function updateVolumeUI() {
            const percent = Math.round(volume * 100);
            volumeLevel.style.width = `${percent}%`;
            volumeThumb.style.left = `${percent}%`;
            volumeValue.textContent = `${percent}%`;
            if (volume === 0) volumeIcon.textContent = '🔇';
            else if (volume < 0.5) volumeIcon.textContent = '🔉';

        }

        // ========== РУЛЕТКА ==========
        let isRouletting = false;
        
        function startRoulette() {
            if (isRouletting) return;
            isRouletting = true;
            
            const tracks = getCurrentTracks();
            if (tracks.length === 0) {
                console.warn('Нет треков для рулетки');
                isRouletting = false;
                return;
            }
            
            // Создаём список треков для рулетки (много повторов для длинной прокрутки)
            rouletteTrackList.innerHTML = '';
            const repeats = 15; // Увеличиваем количество повторов
            const allItems = [];
            
            for (let r = 0; r < repeats; r++) {
                tracks.forEach((track, index) => {
                    const item = document.createElement('div');
                    item.className = 'roulette-track-item';
                    item.dataset.index = index;
                    item.innerHTML = `
                        <div class="track-title">${track.name}</div>
                        <div class="track-artist">${track.artist}</div>
                    `;
                    rouletteTrackList.appendChild(item);
                    allItems.push({ element: item, track: track, index: index });
                });
            }
            
            // Показываем рулетку (выезжает из основного окна)
            rouletteContainer.classList.add('visible');
            rouletteResult.classList.remove('visible');
            rouletteResult.textContent = '';
            
            // Выбираем случайный трек-победитель
            const winnerIndex = Math.floor(Math.random() * tracks.length);
            const winnerTrack = tracks[winnerIndex];
            
            // Рассчитываем позицию остановки
            const itemWidth = 140; // Ширина элемента + gap
            const containerWidth = rouletteContainer.querySelector('.roulette-window').offsetWidth;
            const centerOffset = containerWidth / 2 - itemWidth / 2;
            
            // Останавливаемся где-то в середине списка (на 8-12 повторении)
            const targetRepeat = 8 + Math.floor(Math.random() * 4);
            const targetPosition = (targetRepeat * tracks.length + winnerIndex) * itemWidth - centerOffset;
            
            // Начинаем с позиции, чтобы первый элемент был виден
            let currentPosition = -centerOffset;
            rouletteTrackList.style.transform = `translateX(${currentPosition}px)`;
            
            // Анимация прокрутки
            const startTime = Date.now();
            const duration = 5000; // 5 секунд для более медленной остановки
            const startPosition = currentPosition;
            const endPosition = -targetPosition;
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Easing функция для очень плавного замедления (ease-out quart)
                const easeOut = 1 - Math.pow(1 - progress, 4);
                
                const currentPos = startPosition + (endPosition - startPosition) * easeOut;
                rouletteTrackList.style.transform = `translateX(${currentPos}px)`;
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // Анимация завершена
                    finishRoulette(winnerTrack, winnerIndex);
                }
            }
            
            // Запускаем анимацию
            requestAnimationFrame(animate);
        }
        
        function finishRoulette(winnerTrack, winnerIndex) {
            console.log('🎰 Победитель рулетки:', winnerTrack.name);
            
            // Подсвечиваем все экземпляры победителя
            const winnerItems = rouletteTrackList.querySelectorAll('.roulette-track-item');
            winnerItems.forEach((item, idx) => {
                if (idx % getCurrentTracks().length === winnerIndex) {
                    item.classList.add('winner');
                }
            });
            
            // Показываем результат
            rouletteResult.textContent = `🎵 ${winnerTrack.name} — ${winnerTrack.artist}`;
            rouletteResult.classList.add('visible');
            
            // Загружаем и играем трек через 2.5 секунды
            setTimeout(() => {
                currentTrackIndex = winnerIndex;
                loadTrack(currentTrackIndex);
                audio.play().catch(e => console.warn('Play error:', e));
                
                // Скрываем рулетку через 4 секунды
                setTimeout(() => {
                    rouletteContainer.classList.remove('visible');
                    // Убираем подсветку
                    winnerItems.forEach(item => item.classList.remove('winner'));
                    isRouletting = false;
                }, 4000);
            }, 2500);
        }

        // ========== РЕЖИМ ПОВТОРА ==========
        function toggleLoopMode() {
            const modes = ['all', 'one', 'shuffle'];
            const icons = ['🔁', '🔂', '🔀'];
            const currentIndex = modes.indexOf(loopMode);
            const nextIndex = (currentIndex + 1) % modes.length;
            loopMode = modes[nextIndex];
            loopBtn.textContent = icons[nextIndex];
            loopBtn.title = `Режим: ${loopMode === 'all' ? 'Повтор всех' : loopMode === 'one' ? 'Повтор одного' : 'Перемешивание'}`;
        }

        // ========== ИСТОРИЯ ==========
        function addToHistory(track) {
            history.unshift({ name: track.name, artist: track.artist, src: track.src });
            if (history.length > 10) history.pop();
            renderHistory();
        }

        function renderHistory() {
            historyListEl.innerHTML = '';
            history.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.textContent = `${index + 1}. ${track.name} — ${track.artist}`;
                item.addEventListener('click', () => {
                    audio.src = track.src;
                    trackSubtitle.textContent = `${track.artist} — ${track.name}`;
                    audio.play().catch(e => console.warn('Play error:', e));
                });
                historyListEl.appendChild(item);
            });
        }

        // ========== ТЕМЫ ==========
        function cycleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const theme = themes[currentThemeIndex];
            if (theme === 'default') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
        }

        // ========== ПОИСК ==========
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            currentTrackIndex = 0;
            renderTrackList();
        });

        // ========== ВКЛАДКИ ==========
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                if (tab === currentTab) return;

                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                currentTab = tab;
                currentTrackIndex = 0;
                searchQuery = '';
                searchInput.value = '';

                const tracks = getCurrentTracks();
                audio.src = tracks[0].src;
                typeWriter(`${tracks[0].artist} — ${tracks[0].name}`, trackSubtitle, 40);

                if (tracks[0].videoSrc) {
                    videoLoadAttempts = 0;
                    showVideo(tracks[0].videoSrc);
                } else {
                    hideVideo();
                }

                renderTrackList();

                if (!audio.paused) audio.play().catch(e => console.warn('Play error:', e));
            });
        });

        // ========== ГОРЯЧИЕ КЛАВИШИ ==========
        document.addEventListener('keydown', (e) => {
            if (e.code === konamiCode[konamiIndex]) {
                konamiIndex++;
                if (konamiIndex === konamiCode.length) {
                    secretUnlocked = true;
                    alert('🎉 СЕКРЕТНЫЙ ТРЕК РАЗБЛОКИРОВАН!');
                    renderTrackList();
                    konamiIndex = 0;
                }
            } else {
                konamiIndex = 0;
            }

            if (e.target.tagName === 'INPUT') return;

            switch(e.code) {
                case 'Space':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowLeft':
                    prevTrack();
                    break;
                case 'ArrowRight':
                    nextTrack();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    volume = Math.min(1, volume + 0.1);
                    audio.volume = volume;
                    updateVolumeUI();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    volume = Math.max(0, volume - 0.1);
                    audio.volume = volume;
                    updateVolumeUI();
                    break;
                case 'KeyM':
                    volume = volume === 0 ? 0.8 : 0;
                    audio.volume = volume;
                    updateVolumeUI();
                    break;
                case 'KeyR':
                    startRoulette();
                    break;
                case 'KeyL':
                    toggleLoopMode();
                    break;
            }
        });

        // ========== КЛИК ПО ЛОГОТИПУ (СЕКРЕТ) ==========
        titleText.addEventListener('click', () => {
            titleClickCount++;
            if (titleClickCount >= 10) {
                secretUnlocked = true;
                alert('🎉 СЕКРЕТНЫЙ ТРЕК РАЗБЛОКИРОВАН!');
                renderTrackList();
                titleClickCount = 0;
            }
            setTimeout(() => titleClickCount = 0, 2000);
        });

        // ========== КАСТОМНЫЙ КУРСОР ==========
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
        document.addEventListener('mouseup', () => cursor.classList.remove('clicking'));

        // ========== RIPPLE ЭФФЕКТ ==========
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            ripple.style.width = '20px';
            ripple.style.height = '20px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });

        // ========== КНОПКИ ==========
        historyBtn.addEventListener('click', () => {
            historyPanel.classList.toggle('visible');
        });

        themeBtn.addEventListener('click', cycleTheme);
        rouletteBtn.addEventListener('click', startRoulette);
        loopBtn.addEventListener('click', toggleLoopMode);

        // ========== СОБЫТИЯ ==========
        audio.addEventListener('ended', nextTrack);
        playBtn.addEventListener('click', togglePlay);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', updateProgress);
        progressContainer.addEventListener('click', setProgress);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        async function init() {
            await playHackEffect();
            
            audio.volume = volume;
            updateVolumeUI();
            renderTrackList();
            const initialTracks = getCurrentTracks();
            typeWriter(`${initialTracks[0].artist} — ${initialTracks[0].name}`, trackSubtitle, 40);
            audio.src = initialTracks[0].src;
            quoteEl.textContent = quotes[Math.floor(Math.random() * quotes.length)];
            
            drawVisualizer();
        }

        init();
    </script>
</body>
</html>
