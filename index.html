<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME NAHUI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>G</text></svg>">
    <style>
        :root {
            --primary: #57f287;
            --primary-rgb: 87, 242, 135;
            --secondary: #78ffaa;
            --bg-dark: #15171e; 
            --bg-card: rgba(30, 33, 42, 0.92);
            --bg-panel: rgba(35, 38, 48, 0.85);
            --border: #2c2f36;
            --text: #fff;
            --text-dim: #8a8f98;
        }
        [data-theme="blue"] { --primary: #4dabf7; --primary-rgb: 77, 171, 247; --secondary: #74c0fc; }
        [data-theme="purple"] { --primary: #b197fc; --primary-rgb: 177, 151, 252; --secondary: #d0bfff; }
        [data-theme="red"] { --primary: #ff6b6b; --primary-rgb: 255, 107, 107; --secondary: #ffa8a8; }
        [data-theme="rad"] { --primary: #ff00ff; --primary-rgb: 255, 0, 255; --secondary: #00ffff; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { cursor: none; }
        .custom-cursor {
            position: fixed; width: 20px; height: 20px; border: 2px solid var(--primary); border-radius: 50%;
            pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
            transition: transform 0.1s ease, width 0.2s, height 0.2s; box-shadow: 0 0 10px var(--primary);
        }
        .custom-cursor::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: var(--primary); border-radius: 50%; transform: translate(-50%, -50%);
        }
        .custom-cursor.clicking { width: 15px; height: 15px; }

        body {
            background-color: var(--bg-dark); font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            color: var(--text); overflow: hidden; position: relative;
        }

        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1) 1px, transparent 1px, transparent 2px);
        }
        .crt-overlay::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.2) 100%);
        }

        #video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            pointer-events: none; opacity: 0; transition: opacity 1s ease; overflow: hidden; background: transparent;
        }
        #video-bg.visible { opacity: 1; }
        #video-bg video {
            position: absolute; top: 50%; left: 50%; width: 100vw; height: 100vh;
            object-fit: cover; transform: translate(-50%, -50%); pointer-events: none;
        }

        #visualizer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        .category-toggle-btn {
            position: absolute;
            top: 50%;
            left: -130px;
            transform: translateY(-50%);
            width: 110px;
            height: 50px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 99;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px;
        }
        .category-toggle-btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.5);
            left: -135px;
        }

        .category-panel {
            position: absolute;
            top: 50%;
            left: -300px;
            transform: translateY(-50%);
            width: 260px;
            background: var(--bg-card);
            border: 2px solid var(--primary);
            border-radius: 12px;
            padding: 20px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(6px);
        }
        .category-panel.visible {
            opacity: 1;
            pointer-events: auto;
            left: -280px;
        }
        .category-title { color: var(--primary); font-size: 0.9rem; margin-bottom: 15px; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Стили для кнопок плейлистов */
        .playlist-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .playlist-btn:hover {
            background: var(--border);
            color: var(--text);
        }
        .playlist-btn.active {
            background: rgba(var(--primary-rgb), 0.2);
            color: var(--primary);
            border-color: var(--primary);
        }

        .hack-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Courier New', monospace; color: var(--primary); padding: 40px; transition: opacity 0.5s;
        }
        .hack-overlay.hidden { opacity: 0; pointer-events: none; }
        .hack-text { font-size: 14px; line-height: 1.6; white-space: pre-wrap; max-width: 800px; text-align: left; }
        .hack-cursor { display: inline-block; width: 10px; height: 16px; background: var(--primary); animation: blink 0.7s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

        .player-card {
            background: linear-gradient(145deg, var(--bg-card), rgba(35, 38, 48, 0.92));
            border: 2px solid var(--primary); box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.3);
            border-radius: 12px; padding: 30px; width: 380px; text-align: center; position: relative; z-index: 2;
            backdrop-filter: blur(6px); transition: background 1s ease, backdrop-filter 1s ease, box-shadow 0.1s, border-color 1s ease; overflow: visible;
        }
        .player-card.video-active { background: rgba(21, 23, 30, 0.25) !important; backdrop-filter: blur(2px); border-color: rgba(var(--primary-rgb), 0.4); }

        .title {
            font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px;
            color: var(--primary); position: relative; display: inline-block; cursor: pointer;
        }
        .title.glitch::before, .title.glitch::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .title.glitch::before { animation: glitch-1 0.3s infinite; color: #ff00ff; z-index: -1; }
        .title.glitch::after { animation: glitch-2 0.3s infinite; color: #00ffff; z-index: -2; }
        @keyframes glitch-1 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(20% 0 60% 0); transform: translate(-2px, 2px); }
            40% { clip-path: inset(40% 0 40% 0); transform: translate(2px, -2px); }
            60% { clip-path: inset(60% 0 20% 0); transform: translate(-2px, -2px); }
            80% { clip-path: inset(80% 0 0% 0); transform: translate(2px, 2px); }
        }
        @keyframes glitch-2 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(60% 0 20% 0); transform: translate(2px, -2px); }
            40% { clip-path: inset(40% 0 40% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(20% 0 60% 0); transform: translate(2px, 2px); }
            80% { clip-path: inset(0% 0 80% 0); transform: translate(-2px, -2px); }
        }

        .subtitle-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; min-height: 60px; }
        .subtitle { font-size: 0.8rem; color: var(--text-dim); min-height: 1.2em; text-align: center; }
        .track-actions { display: flex; gap: 15px; margin-top: 8px; }
        .action-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text-dim);
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .action-btn:hover { border-color: var(--primary); color: var(--primary); transform: scale(1.1); }
        .action-btn.liked { background: rgba(255, 107, 107, 0.2); border-color: #ff6b6b; color: #ff6b6b; }
        .action-btn.disliked { background: rgba(138, 143, 152, 0.2); border-color: #8a8f98; color: #8a8f98; }

        .search-input {
            width: 100%; padding: 8px 12px; background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-family: 'Courier New', monospace; font-size: 0.8rem;
            margin-bottom: 10px; outline: none; transition: border-color 0.3s;
        }
        .search-input:focus { border-color: var(--primary); }
        .search-input::placeholder { color: var(--text-dim); }

        /* УБРАНЫ ВКЛАДКИ С ПЛЕЕРА */

        .track-list {
            background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px;
            margin-bottom: 20px; max-height: 150px; overflow-y: auto; text-align: left;
        }
        .track-list::-webkit-scrollbar { width: 4px; }
        .track-list::-webkit-scrollbar-track { background: #1b1e26; }
        .track-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }
        .track-item {
            padding: 10px 15px; cursor: pointer; font-size: 0.8rem; color: var(--text-dim);
            transition: all 0.2s ease; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px;
        }
        .track-item:last-child { border-bottom: none; }
        .track-item:hover { background: var(--border); color: var(--text); }
        .track-item.active { background: rgba(var(--primary-rgb), 0.1); color: var(--primary); border-left: 3px solid var(--primary); }
        .track-item.secret { background: rgba(255, 215, 0, 0.05); border-left: 3px solid gold; }
        .track-item .track-number { font-size: 0.7rem; opacity: 0.5; min-width: 20px; }
        .track-item .track-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .controls { margin-bottom: 20px; }
        .play-btn {
            background: transparent; color: var(--primary); border: 2px solid var(--primary);
            padding: 12px 40px; font-size: 1.1rem; font-weight: bold; border-radius: 8px;
            cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px;
            font-family: 'Courier New', Courier, monospace; position: relative; overflow: hidden;
        }
        .play-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--primary); transition: left 0.3s ease; z-index: -1;
        }
        .play-btn:hover { color: var(--bg-dark); box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.4); }
        .play-btn:hover::before { left: 0; }
        .play-btn.playing { background: #ff4757; border-color: #ff4757; color: #fff; }
        .play-btn.playing::before { background: #ff4757; }

        .progress-container {
            background-color: var(--border); border-radius: 5px; cursor: pointer;
            margin-bottom: 10px; height: 6px; width: 100%; position: relative;
        }
        .progress { background-color: var(--primary); border-radius: 5px; height: 100%; width: 0%; transition: width 0.1s linear; }
        .time-info { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 20px; }
        
        .volume-section { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .volume-icon { font-size: 1rem; color: var(--primary); min-width: 20px; }
        .volume-slider-container { flex: 1; position: relative; height: 6px; background-color: var(--border); border-radius: 5px; cursor: pointer; }
        .volume-level { background-color: var(--primary); border-radius: 5px; height: 100%; width: 80%; transition: width 0.05s linear; pointer-events: none; }
        .volume-thumb {
            position: absolute; top: 50%; left: 80%; width: 14px; height: 14px; background: var(--primary);
            border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px rgba(var(--primary-rgb), 0.5);
            cursor: grab; transition: transform 0.1s ease, box-shadow 0.2s ease; z-index: 2;
        }
        .volume-thumb:hover { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 14px rgba(var(--primary-rgb), 0.8); }
        .volume-thumb.dragging { cursor: grabbing; transform: translate(-50%, -50%) scale(1.4); box-shadow: 0 0 18px rgba(var(--primary-rgb), 1); }
        .volume-value { font-size: 0.7rem; color: var(--text-dim); min-width: 35px; text-align: right; }

        .nav-buttons { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .nav-btn {
            background: var(--border); color: var(--primary); border: 1px solid var(--primary);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
            font-family: 'Courier New', Courier, monospace;
        }
        .nav-btn:hover { background: var(--primary); color: var(--bg-dark); box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.4); }
        .nav-btn.active { background: var(--primary); color: var(--bg-dark); }

        .bottom-controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .bottom-btn {
            background: var(--bg-panel); color: var(--text-dim); border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
            font-family: 'Courier New', monospace; transition: all 0.3s;
        }
        .bottom-btn:hover { border-color: var(--primary); color: var(--primary); }

        .quote { margin-top: 15px; font-size: 0.7rem; color: var(--text-dim); font-style: italic; min-height: 1.5em; opacity: 0.7; }

        .history-panel {
            position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card);
            border: 1px solid var(--primary); border-radius: 8px; padding: 15px; margin-top: 10px;
            max-height: 200px; overflow-y: auto; display: none; z-index: 10;
        }
        .history-panel.visible { display: block; }
        .history-title { color: var(--primary); font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase; }
        .history-item {
            padding: 6px 10px; font-size: 0.75rem; color: var(--text-dim); border-bottom: 1px solid var(--border);
            cursor: pointer; transition: all 0.2s;
        }
        .history-item:hover { color: var(--primary); background: rgba(var(--primary-rgb), 0.1); }

        .roulette-wrapper-outer {
            position: absolute; top: 50%; left: calc(100% + 20px); transform: translateY(-50%) translateX(40px);
            width: 240px; z-index: 100; pointer-events: none; opacity: 0; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .roulette-wrapper-outer.visible { transform: translateY(-50%) translateX(0); opacity: 1; pointer-events: auto; }
        .roulette-container {
            background: linear-gradient(145deg, var(--bg-card), rgba(35, 38, 48, 0.98));
            border: 2px solid var(--primary); border-radius: 12px; padding: 20px;
            box-shadow: 0 0 30px rgba(var(--primary-rgb), 0.5); backdrop-filter: blur(6px);
        }
        .roulette-title {
            color: var(--primary); font-size: 0.9rem; text-align: center; margin-bottom: 15px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold; text-shadow: 0 0 10px rgba(var(--primary-rgb), 0.5);
        }
        .roulette-window {
            position: relative; overflow: hidden; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-panel); width: 100%; height: 240px;
        }
        .roulette-pointer {
            position: absolute; top: 50%; right: -14px; transform: translateY(-50%); width: 0; height: 0;
            border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-right: 16px solid var(--primary);
            z-index: 10; filter: drop-shadow(0 0 10px rgba(var(--primary-rgb), 0.8));
        }
        .roulette-pointer::after {
            content: ''; position: absolute; top: 50%; right: 16px; transform: translateY(-50%);
            width: 100px; height: 2px; background: linear-gradient(to left, var(--primary), transparent); opacity: 0.5;
        }
        .roulette-track-list { display: flex; flex-direction: column; gap: 0; will-change: transform; }
        .roulette-track-item {
            flex: 0 0 80px; width: 100%; padding: 10px; text-align: center; background: var(--bg-panel);
            border-bottom: 1px solid var(--border); font-size: 0.75rem; color: var(--text-dim);
            display: flex; flex-direction: column; justify-content: center; transition: all 0.3s;
        }
        .roulette-track-item:last-child { border-bottom: none; }
        .roulette-track-item.winner {
            background: rgba(var(--primary-rgb), 0.3); color: var(--primary); font-weight: bold;
            box-shadow: inset 0 0 20px rgba(var(--primary-rgb), 0.4); border: 1px solid var(--primary); transform: scale(1.05);
        }
        .roulette-track-item .track-title { font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.8rem; }
        .roulette-track-item .track-artist { font-size: 0.65rem; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .roulette-result {
            margin-top: 15px; padding: 10px; background: rgba(var(--primary-rgb), 0.15); border: 1px solid var(--primary);
            border-radius: 6px; text-align: center; color: var(--primary); font-size: 0.8rem;
            opacity: 0; transform: translateY(10px); transition: all 0.5s;
        }
        .roulette-result.visible { opacity: 1; transform: translateY(0); }

        .ripple {
            position: fixed; border-radius: 50%; background: rgba(var(--primary-rgb), 0.3);
            pointer-events: none; transform: scale(0); animation: rippleAnim 0.6s ease-out; z-index: 9997;
        }
        @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="custom-cursor" id="cursor"></div>
    <audio id="secretSound" src="https://www.myinstants.com/media/sounds/pornhub-intro.mp3" preload="auto"></audio>

    <div class="hack-overlay" id="hackOverlay">
        <div class="hack-text" id="hackText"></div>
    </div>

    <canvas id="visualizer"></canvas>
    <div id="video-bg"></div>
    
    <div class="player-card" id="playerCard">
        <button class="category-toggle-btn" id="categoryToggleBtn">Категории</button>
        <div class="category-panel" id="categoryPanel">
            <div class="category-title">Плейлисты</div>
            <!-- ДОБАВЛЕНЫ КНОПКИ ПЛЕЙЛИСТОВ -->
            <button class="playlist-btn active" data-playlist="all">Все треки</button>
            <button class="playlist-btn" data-playlist="chill">Chill</button>
            <button class="playlist-btn" data-playlist="nostalgia">Ностальгия</button>
            <button class="playlist-btn" data-playlist="favorites">Избранное</button>
            <button class="playlist-btn" data-playlist="disliked">Дизлайк</button>
        </div>

        <div class="title" id="titleText" data-text="WELCOME NAHUI">WELCOME NAHUI</div>
        
        <div class="subtitle-area">
            <div class="subtitle" id="trackSubtitle">CHILL</div>
            <div class="track-actions">
                <button class="action-btn" id="likeBtn" title="Нравится">★</button>
                <button class="action-btn" id="dislikeBtn" title="Не нравится">▽</button>
            </div>
        </div>

        <input type="text" class="search-input" id="searchInput" placeholder="Поиск треков...">
        
        <!-- ВКЛАДКИ УБРАНЫ -->
        
        <div class="track-list" id="trackList"></div>
        
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" title="Предыдущий (←)">◄</button>
            <button class="nav-btn" id="rouletteBtn" title="Рулетка (R)"></button>
            <button class="nav-btn" id="loopBtn" title="Режим повтора (L)">🔁</button>
            <button class="nav-btn" id="nextBtn" title="Следующий (→)">►</button>
        </div>
        
        <audio id="audio" preload="auto"></audio>
        
        <div class="controls">
            <button class="play-btn" id="playBtn">▶</button>
        </div>
        
        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>
        
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
        
        <div class="volume-section">
            <span class="volume-icon" id="volumeIcon">🔊</span>
            <div class="volume-slider-container" id="volumeContainer">
                <div class="volume-level" id="volumeLevel"></div>
                <div class="volume-thumb" id="volumeThumb"></div>
            </div>
            <span class="volume-value" id="volumeValue">80%</span>
        </div>
        
        <div class="bottom-controls">
            <button class="bottom-btn" id="historyBtn">История</button>
            <button class="bottom-btn" id="themeBtn">Тема</button>
        </div>

        <div class="quote" id="quote"></div>

        <div class="history-panel" id="historyPanel">
            <div class="history-title">История прослушиваний</div>
            <div id="historyList"></div>
        </div>
        
        <div class="roulette-wrapper-outer" id="rouletteWrapper">
            <div class="roulette-container" id="rouletteContainer">
                <div class="roulette-title">РУЛЕТКА</div>
                <div class="roulette-window">
                    <div class="roulette-pointer"></div>
                    <div class="roulette-track-list" id="rouletteTrackList"></div>
                </div>
                <div class="roulette-result" id="rouletteResult"></div>
            </div>
        </div>
    </div>

    <script>
        const playlists = {
            chill: [
                { name: "Mirage", artist: "Creepy Nuts", src: "https://cdn11.deliciousoranges.com/s1/get/music/20250711/Creepy_Nuts_-_Mirage_79280769.mp3", categories: ["chill"] },

        ];
        let particles = [];
        function initParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    radius: Math.random() * 1.8 + 0.4, speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3 - 0.15, alpha: Math.random() * 0.5 + 0.2,

        resizeCanvas();

        function drawWave(wave, time, volumeFactor) {
            const WIDTH = canvas.width, HEIGHT = canvas.height, baseY = HEIGHT * wave.y, amp = wave.amplitude * volumeFactor;
            ctx.beginPath(); ctx.moveTo(0, HEIGHT);
            for (let x = 0; x <= WIDTH; x += 4) {
                const y = baseY + Math.sin(x * wave.frequency + time * wave.speed + wave.phase) * amp +
                          Math.sin(x * wave.frequency * 2.3 + time * wave.speed * 1.5) * amp * 0.3 +
                          Math.sin(x * wave.frequency * 0.5 + time * wave.speed * 0.7) * amp * 0.5;
                if (x === 0) ctx.lineTo(0, y); else ctx.lineTo(x, y);
            }
            ctx.lineTo(WIDTH, HEIGHT); ctx.closePath();
            const primaryRGB = getComputedStyle(document.documentElement).getPropertyValue('--primary-rgb').trim();
            const gradient = ctx.createLinearGradient(0, baseY - amp, 0, HEIGHT);
            gradient.addColorStop(0, `rgba(${primaryRGB}, ${0.18 * volumeFactor})`);
            gradient.addColorStop(1, `rgba(${primaryRGB}, 0)`);
            ctx.fillStyle = gradient; ctx.fill();
        }
        function drawParticles(time, volumeFactor) {
            const primaryRGB = getComputedStyle(document.documentElement).getPropertyValue('--primary-rgb').trim();
            for (const p of particles) {
                const parallaxFactor = 0.5 + p.layer * 0.5;
                p.x += p.speedX * parallaxFactor; p.y += p.speedY * parallaxFactor;
                p.x += Math.sin(time * 0.01 + p.twinklePhase) * 0.2 * volumeFactor;
                if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
                const twinkle = Math.sin(time * p.twinkleSpeed + p.twinklePhase) * 0.5 + 0.5;
                const alpha = p.alpha * (0.5 + twinkle * 0.5) * (0.4 + volumeFactor * 0.6);
                ctx.beginPath();
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 4);
                grad.addColorStop(0, `rgba(${primaryRGB}, ${alpha})`);
                grad.addColorStop(0.4, `rgba(${primaryRGB}, ${alpha * 0.5})`);
                grad.addColorStop(1, `rgba(${primaryRGB}, 0)`);
                ctx.fillStyle = grad; ctx.arc(p.x, p.y, p.radius * 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
            }

            ctx.fillStyle = grad; ctx.fillRect(0, 0, WIDTH, HEIGHT);

                const playlist = btn.dataset.playlist;
                if (playlist === currentPlaylist) return;
                
                playlistBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentPlaylist = playlist;
                currentTrackIndex = 0;
                searchQuery = '';
                searchInput.value = '';
                renderTrackList();
                loadTrack(0, false);
                saveState();
            });
        });

        categoryToggleBtn.addEventListener('click', () => {
            categoryPanel.classList.toggle('visible');
        });
        
        function addToHistory(track) {
            if (history.length > 0 && history[0].src === track.src) return;
            history.unshift({ name: track.name, artist: track.artist, src: track.src });
            if (history.length > 10) history.pop();
            renderHistory();
        }
        function renderHistory() {
            historyListEl.innerHTML = '';
            if (history.length === 0) {
                historyListEl.innerHTML = '<div style="padding:10px; color:var(--text-dim); text-align:center;">История пуста</div>';
                return;
            }
            history.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.textContent = `${index + 1}. ${track.name} — ${track.artist}`;
                item.addEventListener('click', () => {
                    const tracks = getCurrentTracks();
                    const idx = tracks.findIndex(t => t.src === track.src);
                    if (idx !== -1) {
                        loadTrack(idx, true);
                    } else {
                        const globalIdx = allTracks.findIndex(t => t.src === track.src);
                        if(globalIdx !== -1) {
                             audio.src = track.src;
                             typeWriter(`${track.artist} — ${track.name}`, trackSubtitle, 40);
                             audio.play().catch(e => console.warn('Play error:', e));
                             updatePlayButtonState(true);
                        }
                    }
                });
                historyListEl.appendChild(item);
            });
        }
        function toggleLoopMode() {
            const modes = ['all', 'one', 'shuffle'];
            const icons = ['🔁', '🔂', '🔀'];
            const currentIndex = modes.indexOf(loopMode);
            loopMode = modes[(currentIndex + 1) % modes.length];
            loopBtn.textContent = icons[(currentIndex + 1) % modes.length];
            loopBtn.title = `Режим: ${loopMode === 'all' ? 'Повтор всех' : loopMode === 'one' ? 'Повтор одного' : 'Перемешивание'}`;
            saveState();
        }
        function cycleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const theme = themes[currentThemeIndex];
            if (theme === 'default') document.documentElement.removeAttribute('data-theme');
            else document.documentElement.setAttribute('data-theme', theme);
            saveState();
        }
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            currentTrackIndex = 0;
            renderTrackList();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === konamiCode[konamiIndex]) {
                konamiIndex++;
                if (konamiIndex === konamiCode.length) {
                    secretUnlocked = true;
                    alert('🎉 СЕКРЕТНЫЙ ТРЕК РАЗБЛОКИРОВАН!');
                    renderTrackList();
                    konamiIndex = 0;
                }
            } else { konamiIndex = 0; }
            if (e.target.tagName === 'INPUT') return;
            switch(e.code) {
                case 'Space': e.preventDefault(); togglePlay(); break;
                case 'ArrowLeft': prevTrack(); break;
                case 'ArrowRight': nextTrack(); break;
                case 'ArrowUp': e.preventDefault(); volume = Math.min(1, volume + 0.1); audio.volume = volume; updateVolumeUI(); saveState(); break;
                case 'ArrowDown': e.preventDefault(); volume = Math.max(0, volume - 0.1); audio.volume = volume; updateVolumeUI(); saveState(); break;
                case 'KeyM': volume = volume === 0 ? 0.8 : 0; audio.volume = volume; updateVolumeUI(); saveState(); break;
                case 'KeyR': startRoulette(); break;
                case 'KeyL': toggleLoopMode(); break;
            }
        });
        document.addEventListener('mousemove', (e) => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
        document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
        document.addEventListener('mouseup', () => cursor.classList.remove('clicking'));
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div'); ripple.className = 'ripple';
            ripple.style.left = e.clientX + 'px'; ripple.style.top = e.clientY + 'px';
            ripple.style.width = '20px'; ripple.style.height = '20px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
        historyBtn.addEventListener('click', () => historyPanel.classList.toggle('visible'));
        themeBtn.addEventListener('click', cycleTheme);
        rouletteBtn.addEventListener('click', startRoulette);
        loopBtn.addEventListener('click', toggleLoopMode);
        audio.addEventListener('ended', nextTrack);
        playBtn.addEventListener('click', togglePlay);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', updateProgress);
        progressContainer.addEventListener('click', setProgress);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        let isRouletting = false;
        function startRoulette() {
            if (isRouletting) return;
            isRouletting = true;
            const tracks = getCurrentTracks();
            if (tracks.length === 0) { isRouletting = false; return; }
            rouletteTrackList.innerHTML = '';
            for (let r = 0; r < 20; r++) {
                tracks.forEach((track, index) => {
                    const item = document.createElement('div');
                    item.className = 'roulette-track-item';
                    item.innerHTML = `<div class="track-title">${track.name}</div><div class="track-artist">${track.artist}</div>`;
                    rouletteTrackList.appendChild(item);
                });
            }
            rouletteWrapper.classList.add('visible');
            rouletteResult.classList.remove('visible');
            rouletteResult.textContent = '';
            const winnerIndex = Math.floor(Math.random() * tracks.length);
            const winnerTrack = tracks[winnerIndex];
            const itemHeight = 80, windowHeight = 240;
            const centerOffset = (windowHeight / 2) - (itemHeight / 2);
            const targetRepeat = 12 + Math.floor(Math.random() * 5);
            const targetItemIndex = (targetRepeat * tracks.length) + winnerIndex;
            const endPosition = centerOffset - (targetItemIndex * itemHeight);
            let currentPosition = -centerOffset;
            rouletteTrackList.style.transform = `translateY(${currentPosition}px)`;
            const startTime = Date.now(), duration = 5000, startPosition = currentPosition;
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 4);
                rouletteTrackList.style.transform = `translateY(${startPosition + (endPosition - startPosition) * easeOut}px)`;
                if (progress < 1) requestAnimationFrame(animate);
                else finishRoulette(winnerTrack, winnerIndex);
            }
            requestAnimationFrame(animate);
        }
        function finishRoulette(winnerTrack, winnerIndex) {
            const winnerItems = rouletteTrackList.querySelectorAll('.roulette-track-item');
            winnerItems.forEach((item, idx) => {
                if (idx % getCurrentTracks().length === winnerIndex) item.classList.add('winner');
            });
            rouletteResult.textContent = `🎵 ${winnerTrack.name} — ${winnerTrack.artist}`;
            rouletteResult.classList.add('visible');
            setTimeout(() => {
                loadTrack(winnerIndex, true);
                setTimeout(() => {
                    rouletteWrapper.classList.remove('visible');
                    winnerItems.forEach(item => item.classList.remove('winner'));
                    isRouletting = false;
                }, 4000);
            }, 2500);
        }
        async function init() {
            await playHackEffect();
            if (savedState.theme !== 'default') {
                document.documentElement.setAttribute('data-theme', savedState.theme);
            }
            audio.volume = volume;
            updateVolumeUI();
            
            // Устанавливаем активную кнопку плейлиста
            playlistBtns.forEach(btn => {
                if (btn.dataset.playlist === currentPlaylist) {
                    btn.classList.add('active');
                }
            });
            
            renderHistory();
            renderTrackList();
            loadTrack(currentTrackIndex, false);
            quoteEl.textContent = quotes[Math.floor(Math.random() * quotes.length)];
            drawVisualizer();
        }
        init();
    </script>
</body>
</html>
