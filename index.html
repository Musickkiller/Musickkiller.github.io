<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME NAHUI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0e12;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        /* Контейнер плеера */
        .player-card {
            background: linear-gradient(145deg, #14161d, #1b1e26);
            border: 2px solid #57f287;
            box-shadow: 0 0 20px rgba(87, 242, 135, 0.2);
            border-radius: 12px;
            padding: 30px;
            width: 380px;
            text-align: center;
        }
        .title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #57f287;
        }
        .subtitle {
            font-size: 0.8rem;
            color: #8a8f98;
            margin-bottom: 20px;
        }

        /* Список треков */
        .track-list {
            background: #1b1e26;
            border: 1px solid #2c2f36;
            border-radius: 8px;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
        }
        .track-list::-webkit-scrollbar {
            width: 4px;
        }
        .track-list::-webkit-scrollbar-track {
            background: #1b1e26;
        }
        .track-list::-webkit-scrollbar-thumb {
            background: #57f287;
            border-radius: 2px;
        }
        .track-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #8a8f98;
            transition: all 0.2s ease;
            border-bottom: 1px solid #2c2f36;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .track-item:last-child {
            border-bottom: none;
        }
        .track-item:hover {
            background: #2c2f36;
            color: #fff;
        }
        .track-item.active {
            background: rgba(87, 242, 135, 0.1);
            color: #57f287;
            border-left: 3px solid #57f287;
        }
        .track-item .track-number {
            font-size: 0.7rem;
            opacity: 0.5;
            min-width: 20px;
        }
        .track-item .track-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Кнопка управления */
        .controls {
            margin-bottom: 20px;
        }
        .play-btn {
            background-color: #57f287;
            color: #0d0e12;
            border: none;
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(87, 242, 135, 0.4);
            font-family: 'Courier New', Courier, monospace;
        }
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 25px rgba(87, 242, 135, 0.6);
        }

        /* Прогресс-бар */
        .progress-container {
            background-color: #2c2f36;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            height: 6px;
            width: 100%;
            position: relative;
        }
        .progress {
            background-color: #57f287;
            border-radius: 5px;
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #8a8f98;
            margin-bottom: 20px;
        }

        /* Громкость */
        .volume-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .volume-icon {
            font-size: 1rem;
            color: #57f287;
            min-width: 20px;
        }
        .volume-slider-container {
            flex: 1;
            position: relative;
            height: 6px;
            background-color: #2c2f36;
            border-radius: 5px;
            cursor: pointer;
        }
        .volume-level {
            background-color: #57f287;
            border-radius: 5px;
            height: 100%;
            width: 80%;
            transition: width 0.1s linear;
        }
        .volume-value {
            font-size: 0.7rem;
            color: #8a8f98;
            min-width: 35px;
            text-align: right;
        }

        /* Навигация треков */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .nav-btn {
            background: #2c2f36;
            color: #57f287;
            border: 1px solid #57f287;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-family: 'Courier New', Courier, monospace;
        }
        .nav-btn:hover {
            background: #57f287;
            color: #0d0e12;
            box-shadow: 0 0 15px rgba(87, 242, 135, 0.4);
        }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="title">WELCOME NAHUI</div>
        <div class="subtitle" id="trackSubtitle">CHILL</div>

        <!-- Список треков -->
        <div class="track-list" id="trackList"></div>

        <!-- Навигация -->
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" title="Предыдущий">◄</button>
            <button class="nav-btn" id="nextBtn" title="Следующий">►</button>
        </div>

        <audio id="audio"></audio>

        <!-- Кнопка Play/Pause -->
        <div class="controls">
            <button class="play-btn" id="playBtn">PLAY</button>
        </div>

        <!-- Прогресс-бар -->
        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>

        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <!-- Громкость -->
        <div class="volume-section">
            <span class="volume-icon" id="volumeIcon">🔊</span>
            <div class="volume-slider-container" id="volumeContainer">
                <div class="volume-level" id="volumeLevel"></div>
            </div>
            <span class="volume-value" id="volumeValue">80%</span>
        </div>
    </div>

    <script>
        // Список треков — замени URL на свои
        const tracks = [
            {
                name: "Mirage",
                artist: "Creepy Nuts",
                src: "https://cdn11.deliciousoranges.com/s1/get/music/20250711/Creepy_Nuts_-_Mirage_79280769.mp3"
            },
            {
                name: "Don't tell your dreams",
                artist: "LOVIXX, STOSLIV",
                src: "https://cdn5.deliciousoranges.com/s1/get/music/20260621/LOVIXX_-_Dont_tell_your_dreams_81746473.mp3"
            },
            {
                name: "Hilfe",
                artist: "Lostboi Lino",
                src: "https://s1.deliciouspeaches.com/get/music/20250821/Lostboi_Lino_-_Hilfe_79520224.mp3"
            },
            {
                name: "Hurricane",
                artist: "BUNT. feat. HON, SMBDY",
                src: "https://s3.deliciouspeaches.com/get/music/20220126/BUNT_feat_HON_SMBDY_-_Hurricane_73712791.mp3"
            },
            {
                name: "Make It Bun Dem",
                artist: "Skrillex, Damian Marley",
                src: "https://cdn2.deliciousoranges.com/s1/get/music/20170905/Skrillex_-_Make_It_Bun_Dem_48256501.mp3"
            }
        ];

        let currentTrackIndex = 0;
        let volume = 0.8;

        // Элементы
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const progress = document.getElementById('progress');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const trackList = document.getElementById('trackList');
        const trackSubtitle = document.getElementById('trackSubtitle');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const volumeContainer = document.getElementById('volumeContainer');
        const volumeLevel = document.getElementById('volumeLevel');
        const volumeValue = document.getElementById('volumeValue');
        const volumeIcon = document.getElementById('volumeIcon');

        // Инициализация списка треков
        function renderTrackList() {
            trackList.innerHTML = '';
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item' + (index === currentTrackIndex ? ' active' : '');
                item.innerHTML = `
                    <span class="track-number">${String(index + 1).padStart(2, '0')}</span>
                    <span class="track-name">${track.name} — ${track.artist}</span>
                `;
                item.addEventListener('click', () => loadTrack(index));
                trackList.appendChild(item);
            });
        }

        // Загрузка трека
        function loadTrack(index) {
            currentTrackIndex = index;
            const track = tracks[currentTrackIndex];
            audio.src = track.src;
            trackSubtitle.textContent = `${track.artist} — ${track.name}`;
            renderTrackList();
            audio.play();
            playBtn.innerText = 'PAUSE';
            playBtn.style.backgroundColor = '#ff4757';
            playBtn.style.boxShadow = '0 4px 15px rgba(255, 71, 87, 0.4)';
        }

        // Следующий трек
        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            loadTrack(currentTrackIndex);
        }

        // Предыдущий трек
        function prevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
            loadTrack(currentTrackIndex);
        }

        // Play/Pause
        function togglePlay() {
            if (audio.paused) {
                if (!audio.src) {
                    loadTrack(0);
                    return;
                }
                audio.play();
                playBtn.innerText = 'PAUSE';
                playBtn.style.backgroundColor = '#ff4757';
                playBtn.style.boxShadow = '0 4px 15px rgba(255, 71, 87, 0.4)';
            } else {
                audio.pause();
                playBtn.innerText = 'PLAY';
                playBtn.style.backgroundColor = '#57f287';
                playBtn.style.boxShadow = '0 4px 15px rgba(87, 242, 135, 0.4)';
            }
        }

        // Обновление прогресса
        function updateProgress(e) {
            const { duration, currentTime } = e.srcElement;
            if (!duration) return;

            const progressPercent = (currentTime / duration) * 100;
            progress.style.width = `${progressPercent}%`;

            const formatTime = (time) => Math.floor(time / 60) + ':' + String(Math.floor(time % 60)).padStart(2, '0');
            currentTimeEl.innerText = formatTime(currentTime);
            durationEl.innerText = formatTime(duration);
        }

        // Перемотка
        function setProgress(e) {
            const width = this.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        }

        // Громкость
        function setVolume(e) {
            const width = volumeContainer.clientWidth;
            const clickX = e.offsetX;
            volume = Math.max(0, Math.min(1, clickX / width));
            audio.volume = volume;
            updateVolumeUI();
        }

        function updateVolumeUI() {
            const percent = Math.round(volume * 100);
            volumeLevel.style.width = `${percent}%`;
            volumeValue.textContent = `${percent}%`;

            if (volume === 0) {
                volumeIcon.textContent = '🔇';
            } else if (volume < 0.5) {
                volumeIcon.textContent = '🔉';
            } else {
                volumeIcon.textContent = '🔊';
            }
        }

        // Авто-переключение на следующий трек
        audio.addEventListener('ended', nextTrack);

        // События
        playBtn.addEventListener('click', togglePlay);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', updateProgress);
        progressContainer.addEventListener('click', setProgress);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        volumeContainer.addEventListener('click', setVolume);

        // Инициализация
        audio.volume = volume;
        updateVolumeUI();
        renderTrackList();
        trackSubtitle.textContent = tracks[0].artist + ' — ' + tracks[0].name;
        audio.src = tracks[0].src;
    </script>
</body>
</html>
